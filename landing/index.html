<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="refresh" content="5;url=https://pyxel-composer.pages.dev/" />
<title>8bit BGM generator（Web版）は公開を終了しました</title>
<link rel="icon" href="favicon.ico" />
<style>
  :root { color-scheme: dark; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #16161e;
    color: #e6e6f0;
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN",
      "Yu Gothic", Meiryo, sans-serif;
    line-height: 1.8;
    padding: 24px;
  }
  main {
    max-width: 560px;
    text-align: center;
  }
  h1 {
    font-size: 1.35rem;
    margin: 0 0 1.2rem;
  }
  p { margin: 0 0 1rem; }
  .app { color: #8be9fd; font-weight: 700; }
  .btn {
    display: inline-block;
    margin-top: 0.8rem;
    padding: 0.8rem 1.6rem;
    background: #8be9fd;
    color: #16161e;
    font-weight: 700;
    text-decoration: none;
    border-radius: 6px;
  }
  .btn:hover { background: #a6f0ff; }
  .sub {
    margin-top: 1.6rem;
    font-size: 0.85rem;
    color: #9a9ab0;
  }
  .sub a { color: #9a9ab0; }
</style>
</head>
<body>
<main>
  <h1>8bit BGM generator（Web版）は公開を終了しました</h1>
  <p>
    後継アプリ <span class="app">Pyxel Composer</span> へ移行しました。<br />
    まもなく自動的に移動します。
  </p>
  <p>
    <a class="btn" href="https://pyxel-composer.pages.dev/">
      自動で移動しない場合はこちら
    </a>
  </p>
  <p class="sub">
    ローカル実行版（<code>pyxel play</code>）は引き続きご利用いただけます。<br />
    詳しくは
    <a href="https://github.com/shiromofufactory/8bit-bgm-generator">GitHub リポジトリ</a>
    をご覧ください。
  </p>
</main>
</body>
</html>
